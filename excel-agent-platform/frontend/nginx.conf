limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=5r/s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;
  add_header X-Request-ID $request_id always;

  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 120s;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Request-ID $request_id;
  proxy_hide_header X-Request-ID;

  error_page 413 = @payload_too_large;
  error_page 429 = @rate_limited;
  error_page 500 502 503 504 = @upstream_unavailable;

  location /api/ {
    limit_req zone=api_per_ip burst=20 nodelay;
    proxy_pass http://backend:8000;
  }

  location ~ ^/health {
    limit_req zone=api_per_ip burst=20 nodelay;
    proxy_pass http://backend:8000;
  }

  location ~ ^/(docs|redoc|openapi\.json) {
    limit_req zone=api_per_ip burst=20 nodelay;
    proxy_pass http://backend:8000;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location @payload_too_large {
    default_type application/json;
    return 413 '{"ok":false,"data":null,"error":{"code":"VALIDATION_ERROR","message":"Uploaded payload is too large.","recoverable":true,"next_action":"Upload a smaller workbook or increase gateway client_max_body_size."},"meta":{"request_id":"$request_id","latency_ms":null,"source":"gateway","cached":false}}';
  }

  location @rate_limited {
    default_type application/json;
    return 429 '{"ok":false,"data":null,"error":{"code":"RATE_LIMITED","message":"Too many requests.","recoverable":true,"next_action":"Retry after a short delay."},"meta":{"request_id":"$request_id","latency_ms":null,"source":"gateway","cached":false}}';
  }

  location @upstream_unavailable {
    default_type application/json;
    return 503 '{"ok":false,"data":null,"error":{"code":"UPSTREAM_UNAVAILABLE","message":"Backend service is unavailable.","recoverable":true,"next_action":"Check backend health and retry."},"meta":{"request_id":"$request_id","latency_ms":null,"source":"gateway","cached":false}}';
  }
}
