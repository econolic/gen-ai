x-backend-env: &backend-env
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-5-mini}
  SERPER_API_KEY: ${SERPER_API_KEY:-}
  LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
  LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
  DATA_DIR: /app/data
  REDIS_URL: redis://redis:6379/0
  ENABLE_CHROMA_MEMORY: ${ENABLE_CHROMA_MEMORY:-false}
  CHROMA_DIR: ${CHROMA_DIR:-/app/data/chroma}
  TOOL_TIMEOUT_SECONDS: ${TOOL_TIMEOUT_SECONDS:-12}
  TOOL_RETRY_COUNT: ${TOOL_RETRY_COUNT:-1}
  OFFLINE_DEMO_SEED_FIRST: ${OFFLINE_DEMO_SEED_FIRST:-false}
  ENRICHMENT_CONCURRENCY: ${ENRICHMENT_CONCURRENCY:-8}
  GRAPH_FANOUT_THRESHOLD: ${GRAPH_FANOUT_THRESHOLD:-1000}
  GRAPH_CHUNK_SIZE: ${GRAPH_CHUNK_SIZE:-1000}
  GRAPH_FANOUT_CONCURRENCY: ${GRAPH_FANOUT_CONCURRENCY:-4}
  MCP_EXCEL_URL: ${MCP_EXCEL_URL:-http://mcp-excel:8101/mcp}
  MCP_CALC_URL: ${MCP_CALC_URL:-http://mcp-calc:8102/mcp}
  MCP_SOURCE_URL: ${MCP_SOURCE_URL:-http://mcp-source:8103/mcp}
  MCP_SEARCH_URL: ${MCP_SEARCH_URL:-http://mcp-search:8104/mcp}
  MCP_STRICT_TOOLS: ${MCP_STRICT_TOOLS:-true}

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-excel:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python /app/mcp_servers/excel_server/server.py
    environment: *backend-env
    volumes:
      - ./data:/app/data
    ports:
      - "8101:8101"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8101), 3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5

  mcp-calc:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python /app/mcp_servers/calc_server/server.py
    environment: *backend-env
    ports:
      - "8102:8102"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8102), 3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5

  mcp-source:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python /app/mcp_servers/source_server/server.py
    environment: *backend-env
    ports:
      - "8103:8103"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8103), 3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5

  mcp-search:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python /app/mcp_servers/search_server/server.py
    environment: *backend-env
    ports:
      - "8104:8104"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8104), 3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *backend-env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mcp-excel:
        condition: service_healthy
      mcp-calc:
        condition: service_healthy
      mcp-source:
        condition: service_healthy
      mcp-search:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
